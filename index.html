<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>IndieCore</title>
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="images/logo/logo-no-bg.png" alt="Logo do site" class="logo">
            <p class="black-ops-one-regular">IndieCore</p>
        </div>

        <div class="search-container">
            <form onsubmit="searchGame(event)">
                <input type="text" name="query" placeholder="Pesquisar" autocomplete="off">
                <button type="submit"><i class="bi bi-search"></i></button>
            </form>
        </div>

        <div class="profile">
            <img src="" alt="">
            <p>Nome</p>
        </div>
    </header>
    
    <main class="main-content">
        <aside aria-label="Filtros e categorias">
            <nav class="categories-nav">
                <p>Categorias</p>
                <ul id="genre-filter-list" class="filter-list">
                    <!--dynamic insertion-->
                </ul>
            </nav>
        </aside>

        <section id="card-container" class="card-container" aria-label="Lista de jogos">

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
